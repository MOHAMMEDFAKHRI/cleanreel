# Netlify hosts the static front end in web/. (The API runs separately on Render/Railway/Fly.)
[build]
  publish = "web"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache"

# Always revalidate HTML so visitors get new features immediately (assets stay cached).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SEO demo loops: content-stable media, cache hard (replaced by new filenames if recut).
[[headers]]
  for = "/demos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
