# Netlify hosts the static front end in web/. (The API runs separately on Render/Railway/Fly.)
[build]
  publish = "web"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache"
